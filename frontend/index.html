<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary -->
    <title>DineVerse — Café Ordering Platform</title>
    <meta name="description" content="Order food, book tables, and track your orders — all from your phone." />
    <meta name="theme-color" content="#f97316" />
    <meta name="color-scheme" content="light" />

    <!-- PWA / mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DineVerse" />
    <meta name="application-name" content="DineVerse" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- Prevent text size adjust on orientation change -->
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Razorpay checkout SDK — loaded globally so BillingPage + OrderConfirmation can use window.Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
