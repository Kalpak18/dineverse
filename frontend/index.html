<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="google-site-verification" content="FWHG0HCZe3QuLQod0I7usXhlbjhhpeI-VW7mHMbFeL8" />

    <!-- Primary -->
    <title>DineVerse — Café Ordering Platform</title>
    <meta name="description" content="Order food, book tables, and track your orders — all from your phone." />
    <meta name="theme-color" content="#f97316" />
    <meta name="color-scheme" content="light" />

    <!-- PWA / mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DineVerse" />
    <meta name="application-name" content="DineVerse" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="96x96"   href="/icons/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/icons/favicon-128x128.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/icons/favicon-256x256.png" />
    <link rel="icon" type="image/svg+xml"              href="/favicon.svg" />
    <!-- Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <!-- Windows tile -->
    <meta name="msapplication-TileImage" content="/icons/mstile-144x144.png" />
    <meta name="msapplication-TileColor" content="#f97316" />
    <!-- PWA manifest -->
    <link rel="manifest" href="/icons/site.webmanifest" />

    <!-- Brand font: Poppins (matches DineVerse wordmark) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800;900&display=swap" rel="stylesheet" />

    <!-- Prevent text size adjust on orientation change -->
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Razorpay checkout SDK — loaded globally so BillingPage + OrderConfirmation can use window.Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
