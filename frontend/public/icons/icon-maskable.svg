<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Full bleed for maskable (safe zone = center 80%) -->
  <rect width="512" height="512" fill="#0f1535"/>
  <!-- plate rim -->
  <ellipse cx="256" cy="345" rx="155" ry="30" fill="#e2e8f0"/>
  <ellipse cx="256" cy="340" rx="148" ry="27" fill="#f8fafc"/>
  <!-- cloche dome -->
  <path d="M104 338 Q104 200 256 200 Q408 200 408 338 Z" fill="#f97316"/>
  <!-- dome highlight -->
  <path d="M158 298 Q168 240 256 240 Q344 240 354 298" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="18" stroke-linecap="round"/>
  <!-- knob stem -->
  <line x1="256" y1="218" x2="256" y2="200" stroke="#f97316" stroke-width="20"/>
  <!-- knob -->
  <circle cx="256" cy="188" r="28" fill="#f97316"/>
  <circle cx="256" cy="188" r="11" fill="#0f1535"/>
  <!-- leaf -->
  <path d="M272 156 Q308 132 324 156 Q294 178 272 156Z" fill="#4ade80"/>
  <!-- sparkle -->
  <path d="M370 108 l7 19 l19 7 l-19 7 l-7 19 l-7-19 l-19-7 l19-7Z" fill="#f97316" opacity="0.7"/>
  <path d="M142 152 l4 12 l12 4 l-12 4 l-4 12 l-4-12 l-12-4 l12-4Z" fill="#fbbf24" opacity="0.6"/>
</svg>
