# DineVerse — Nginx reverse proxy config
#
# SETUP STEPS (on your Ubuntu/Debian server):
#   1. sudo apt install nginx certbot python3-certbot-nginx
#   2. sudo cp this file to /etc/nginx/sites-available/dineverse
#   3. sudo ln -s /etc/nginx/sites-available/dineverse /etc/nginx/sites-enabled/
#   4. sudo certbot --nginx -d api.dine-verse.com          ← auto-fills SSL blocks
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# BEFORE RUNNING:
#   - Replace api.dine-verse.com with your actual API domain
#   - Make sure PM2 is running:  pm2 start ecosystem.config.js --env production
#   - PM2 cluster binds all workers to the SAME port (5000) — Nginx connects to it

upstream dineverse_api {
  # ip_hash: same client IP always hits the same upstream worker.
  # This keeps Socket.IO upgrade handshakes on one process.
  # With Redis adapter installed, room data is shared anyway — ip_hash is a belt-and-suspenders.
  ip_hash;

  server 127.0.0.1:5000;

  # If you later split to multiple servers, add them here:
  # server 10.0.0.2:5000;
  # server 10.0.0.3:5000;

  keepalive 64;   # reuse HTTP connections to backend — avoids TCP handshake per request
}

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
  listen 80;
  server_name api.dine-verse.com;
  return 301 https://$host$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name api.dine-verse.com;

  # Certbot fills these in automatically after step 4 above
  # ssl_certificate     /etc/letsencrypt/live/api.dine-verse.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/api.dine-verse.com/privkey.pem;
  # include /etc/letsencrypt/options-ssl-nginx.conf;
  # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  # ── Security headers (belt-and-suspenders with helmet in the app) ──────────
  add_header X-Frame-Options          "DENY"              always;
  add_header X-Content-Type-Options   "nosniff"           always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

  # ── Request size limit (matches app.js express.json limit) ────────────────
  client_max_body_size 2m;

  # ── WebSocket / Socket.IO ────────────────────────────────���────────────────
  # Socket.IO uses long-polling first, then upgrades to WebSocket.
  # Both need proxy_http_version 1.1 and the Upgrade/Connection headers.
  location /socket.io/ {
    proxy_pass         http://dineverse_api;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;

    # Keep WebSocket alive — no timeout for long-lived connections
    proxy_read_timeout  86400s;
    proxy_send_timeout  86400s;
  }

  # ── REST API ──────────────────────────────────────────────────────────────
  location /api/ {
    proxy_pass         http://dineverse_api;
    proxy_http_version 1.1;
    proxy_set_header   Connection         "";   # keep-alive to upstream
    proxy_set_header   Host               $host;
    proxy_set_header   X-Real-IP          $remote_addr;
    proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto  https;

    # Timeouts: 30s for normal requests, 60s for heavy analytics/CSV exports
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # Compress API responses — reduces bandwidth by ~70% for JSON
    gzip              on;
    gzip_types        application/json text/plain;
    gzip_min_length   1024;
  }

  # ── Health check (no gzip, fast) ──────────────────────────────────────────
  location /health {
    proxy_pass         http://dineverse_api;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";
    proxy_read_timeout 5s;
    access_log         off;   # don't spam logs with uptime-monitor pings
  }

  # ── Block non-API paths ────────────────────────────────────────────────────
  location / {
    return 404 '{"success":false,"message":"Not found"}';
    add_header Content-Type application/json;
  }
}
